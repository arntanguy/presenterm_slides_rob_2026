name: "CI - Nix"
on:
  push:
    branches:
      - devel
      - master
      - main
  pull_request:
    branches:
      - devel
      - master
      - main
jobs:
  nix:
    runs-on: "${{ matrix.os }}-latest"
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu]
    steps:
      - uses: actions/checkout@v7
      - uses: cachix/install-nix-action@v31
      - uses: cachix/cachix-action@v17
        with:
          name: mc-rtc-nix
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
          extraPullNames: "ros,gepetto"
      - run: nix flake check -L
      - run: nix build -L
      - name: Build slides-html
        run: nix build .#slides-html
      - name: Upload build result
        uses: actions/upload-artifact@v7
        with:
          name: slides-html
          path: result
  check:
    if: always()
    name: check-macos-linux-nix
    runs-on: ubuntu-latest
    needs:
      - nix
    steps:
      - uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
  deploy:
    needs: nix
    if: success() && github.ref_name == 'main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      pages: write
    steps:
      - uses: actions/checkout@v7
      - name: Retrieve build result
        uses: actions/download-artifact@v8
        with:
          name: slides-html
          path: result
      - name: Prepare static assets to deploy
        run: |
          mkdir -p dist
          cp -R result/* dist
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist
      - uses: actions/deploy-pages@v5
